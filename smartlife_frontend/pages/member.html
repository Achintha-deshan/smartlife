<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLife | Member Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/member.css">
    <link rel="stylesheet" href="../css/sidebar.css">
</head>
<body>

<div class="container">
    <nav class="sidebar" id="sidebar-placeholder"></nav>

    <main class="main-content">
        <header class="glass">
            <div class="header-left">
                <h1><i class="fas fa-users-gear"></i> Member Management</h1>
                <p>SmartLife | Managed by <span id="adminNameDisplay" style="color: var(--primary);">DeshTech Admin</span></p>
            </div>
        </header>

        <div class="main-grid">
            <aside class="glass-card">
                <h3 class="form-title"><i class="fas fa-user-plus"></i> Register Member</h3>
                <form id="memberForm">
                    <div class="form-group">
                        <label>Member ID (Auto)</label>
                        <input type="text" id="memberId" placeholder="MEM-000" readonly class="readonly-input">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter name" required>
                    </div>
                    <div class="form-group">
                        <label>Relation</label>
                        <input type="text" id="nickname" placeholder="Ex: Wife, Brother" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="0712345678" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="member@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="switch-group">
                        <label>Live Tracking</label>
                        <label class="switch">
                            <input type="checkbox" id="isTrackingEnabled" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit">Save Family Member</button>
                </form>
            </aside>

            <section class="glass-card">
                <h3 class="form-title"><i class="fas fa-database"></i> Your Family Members</h3>
                <div class="table-container">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Member Info</th>
                            <th>Relation</th>
                            <th>Tracking</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="memberTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="../js/jqueri-3.7min.js"></script>
<script src="../js/slidebar.js"></script>
<script src="../js/member.js"></script>
</body>
</html>
