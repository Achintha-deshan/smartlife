<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLife - Family Member Tracking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="../css/member-styles.css">
</head>
<body class="tracking-page">
<div class="main-wrapper">
    <div class="container-fluid">
        <div class="tracking-header d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0"><i class="fas fa-satellite text-primary"></i> Family Live Location Tracker</h3>
            <div class="tracking-actions d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="centerMapOnSriLanka()">
                    <i class="fas fa-compress-arrows-alt"></i> Sri Lanka
                </button>
                <button class="btn btn-primary btn-sm" onclick="loadAllMembersLocation()">
                    <i class="fas fa-sync"></i> Refresh Locations
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12">
                <div id="tracking-map-container">
                    <div class="card map-card">
                        <div class="card-body p-0">
                            <div id="family-tracking-map"></div>
                            <div class="last-sync-badge">
                                <small>Last Update: <span id="lblLastSync">--:--:--</span></small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="../js/mem-location.js"></script>
</body>
</html>
