<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLife | Personal Reminders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Syne:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/reminder-style.css">
</head>
<body>

<div class="main-wrapper">
    <nav class="sidebar" id="sidebar-placeholder"></nav>

    <div class="reminder-container">
        <header>
            <div class="header-left">
                <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <h1>Personal Reminders</h1>
            </div>
        </header>

        <div class="glass-card add-card">
            <h3><i class="fas fa-plus-circle"></i> Create New Alert</h3>
            <div class="input-group">
                <input type="text" id="rem-title" placeholder="What's the special occasion?">
                <input type="datetime-local" id="rem-datetime">
                <button onclick="saveNewReminder()" class="main-btn">Set Reminder</button>
            </div>
        </div>

        <div class="list-section">
            <h3><i class="fas fa-list-ul"></i> Upcoming Events</h3>
            <div id="reminder-list" class="reminder-list">
                <div class="loading-msg">Fetching your alerts...</div>
            </div>
        </div>
    </div>
</div>

<audio id="birthday-audio" src="../audio/3dabrar-funny-alarm-317531%20(1).mp3" preload="auto"></audio>
<audio id="normal-audio" src="../audio/soundreality-notification-10-158196.mp3" preload="auto"></audio>

<script src="../js/jqueri-3.7min.js"></script>
<script src="../js/slidebar.js"></script>
<script src="../js/reminder.js"></script>
</body>
</html>
