<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLife - Vehicle GPS Tracking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/vehicle-styles.css">
</head>
<body class="vehicle-tracking-body">

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
        <h4 class="mb-0 text-dark"><i class="fas fa-truck-pickup text-primary me-2"></i> Vehicle Fleet Monitor</h4>
        <div class="actions d-flex gap-2">
            <span class="badge bg-success d-flex align-items-center" id="activeCount">Active: 0</span>
            <button class="btn btn-dark btn-sm" onclick="initMapCenter()">
                <i class="fas fa-crosshairs"></i> Reset View
            </button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0"><i class="fas fa-list"></i> My Vehicles</h6>
                </div>
                <div class="card-body p-0">
                    <div id="vehicle-list" class="list-group list-group-flush">
                        <div class="p-3 text-center text-muted">Loading vehicles...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="card-body p-0 position-relative">
                    <div id="vehicle-map" style="height: 600px;"></div>

                    <div id="geofence-alert-box" class="alert alert-danger d-none shadow-lg position-absolute top-0 start-50 translate-middle-x mt-3" style="z-index: 1000; min-width: 300px;">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span id="alert-msg">Security Alert: Vehicle Out of Zone!</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/vehicle-tracking.js"></script>
</body>
</html>
