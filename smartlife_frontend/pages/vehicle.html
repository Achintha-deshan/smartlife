<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLife | Vehicle Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/member.css"> <link rel="stylesheet" href="../css/sidebar.css"> <style>
    :root { --vehicle-accent: #00d2ff; }
    .btn-submit {
        background: linear-gradient(135deg, var(--vehicle-accent), #3a7bd5);
        border: none;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
</style>
</head>
<body>

<div class="container">
    <nav class="sidebar" id="sidebar-placeholder"></nav>

    <main class="main-content">
        <header class="glass">
            <div class="header-left">
                <h1><i class="fas fa-car-side"></i> Vehicle Management</h1>
                <p>SmartLife | Fleet managed by <span id="adminNameDisplay" style="color: var(--vehicle-accent);">DeshTech Admin</span></p>
            </div>
        </header>

        <div class="main-grid">
            <aside class="glass-card">
                <h3 class="form-title"><i class="fas fa-plus-circle"></i> Add New Vehicle</h3>
                <form id="vehicleForm">
                    <div class="form-group">
                        <label>Vehicle ID (Auto)</label>
                        <input type="text" id="vehi_id" placeholder="VEH-000" readonly class="readonly-input">
                    </div>

                    <div class="form-group">
                        <label>Vehicle Number</label>
                        <input type="text" id="vehi_number" placeholder="Ex: WP CAS-1234" required>
                    </div>

                    <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
                        <h4 style="font-size: 0.9rem; color: var(--vehicle-accent); margin-bottom: 10px;">Geofence / Safe Zone Settings</h4>

                        <div class="form-group">
                            <label>Safe Radius (Meters)</label>
                            <input type="number" id="fence_radius" placeholder="Ex: 500">
                        </div>
                    </div>

                    <input type="hidden" id="adminId">
                    <button type="submit" class="btn-submit" id="btnSaveVehicle">Register Vehicle</button>

                    <div class="form-group">
                        <label>Select Safe Zone on Map (Click to set center)</label>
                        <div id="picker-map" style="height: 250px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--vehicle-accent);"></div>
                    </div>

                    <div class="form-row" style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Latitude</label>
                            <input type="number" step="any" id="fence_lat" readonly placeholder="Auto-filled">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Longitude</label>
                            <input type="number" step="any" id="fence_lng" readonly placeholder="Auto-filled">
                        </div>
                    </div>
                </form>            </aside>

            <section class="glass-card">
                <h3 class="form-title"><i class="fas fa-list-check"></i> Registered Vehicles</h3>
                <div class="table-container">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Vehicle Number</th>
                            <th>Status</th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="vehicleTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/jqueri-3.7min.js"></script>
<script src="../js/slidebar.js"></script> <script src="../js/vehicle.js"></script>

</body>
</html>
